[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
preDeployCommand = "sh -c 'python -m niouzou.scripts.ensure_miniflux_db && alembic upgrade head'"
startCommand = "uvicorn niouzou.main:app --host 0.0.0.0 --port 8000"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
