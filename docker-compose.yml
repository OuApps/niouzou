# Niouzou — production self-hosting stack (Epic 6).
#
#   cp .env.example .env      # then edit secrets
#   docker compose up -d      # → PWA on http://localhost:3000
#
# Zero manual steps: migrations apply once (via `migrate`), the Miniflux admin
# account is provisioned from env vars, and the Miniflux API key is minted
# on demand by the API/cron services on first call (see
# api/niouzou/services/miniflux_bootstrap.py).

name: niouzou

# ── Shared API image: one build, reused by migrate + api + the cron jobs ──────
x-api-build: &api-build
  build:
    context: ./api
  image: niouzou-api:latest

x-api-env: &api-env
  DATABASE_URL: postgresql://${POSTGRES_USER:-niouzou}:${POSTGRES_PASSWORD:-niouzou}@postgres:5432/${POSTGRES_DB:-niouzou}
  MINIFLUX_URL: http://miniflux:8080
  JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-string}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemma-4-26b-a4b-it:free}
  SCORE_THRESHOLD: ${SCORE_THRESHOLD:-0.0}
  RANDOM_SURFACE_RATE: ${RANDOM_SURFACE_RATE:-0.05}
  FEED_GRAVITY: ${FEED_GRAVITY:-1.5}
  # The API proxies POST /admin/refresh here (E7-S16 + E8-S6).
  REFRESH_WORKER_URL: http://worker:8001

services:
  # ── Single Postgres serving both Niouzou and Miniflux ───────────────────────
  # The init script in infra/postgres-init/ creates the `miniflux` user + db on
  # the first boot (Postgres ignores it on subsequent boots).
  postgres:
    # pgvector build of Postgres 17 (E16-S1). ⚠️ Debian/glibc image — if the
    # `niouzou_db` volume was initialised under postgres:17-alpine (musl),
    # text-index collation order differs: run `REINDEX DATABASE niouzou;`
    # (and `miniflux`) once after the first boot on this image.
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-niouzou}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-niouzou}
      POSTGRES_DB: ${POSTGRES_DB:-niouzou}
      MINIFLUX_DB_PASSWORD: ${MINIFLUX_DB_PASSWORD:-miniflux}
    ports:
      - "5432:5432"
    volumes:
      - niouzou_db:/var/lib/postgresql/data
      - ./infra/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-niouzou}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Miniflux: web UI + RSS poller, sharing the postgres above ───────────────
  miniflux:
    image: miniflux/miniflux:2.1.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://miniflux:${MINIFLUX_DB_PASSWORD:-miniflux}@postgres:5432/miniflux?sslmode=disable
      RUN_MIGRATIONS: "1"
      CREATE_ADMIN: "1"
      ADMIN_USERNAME: ${MINIFLUX_ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${MINIFLUX_ADMIN_PASSWORD:-adminpassword}
    healthcheck:
      test: ["CMD", "/usr/bin/miniflux", "-healthcheck", "auto"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── One-shot migrations: run once, before api + crons accept work ───────────
  migrate:
    <<: *api-build
    command: ["alembic", "upgrade", "head"]
    restart: "no"
    environment: *api-env
    depends_on:
      postgres:
        condition: service_healthy

  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    <<: *api-build
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment: *api-env
    depends_on:
      postgres:
        condition: service_healthy
      miniflux:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/health')
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── PWA (static build served by Nginx) ──────────────────────────────────────
  pwa:
    build:
      context: ./pwa
      args:
        # Baked into the bundle at build time. The browser hits the API on the
        # host's :8000, so this stays an absolute, browser-reachable URL.
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
    image: niouzou-pwa:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api

  # ── Refresh worker (E8-S6) ──────────────────────────────────────────────────
  # Single always-on service that:
  #   * exposes POST /run for the API's "Run now" admin trigger (E7-S16)
  #   * schedules fetch+enrich every CRON_FETCH_INTERVAL minutes via APScheduler
  #   * schedules the nightly refresh (weights + dual-score rescore) at
  #     CRON_NIGHTLY_REFRESH_HOUR (renamed in E16-S9)
  # The scheduler shares an asyncio.Lock with /run, so manual + scheduled runs
  # are mutually exclusive — replaces the three one-shot cron containers we had
  # before E8-S6.
  worker:
    <<: *api-build
    restart: unless-stopped
    command: ["uvicorn", "niouzou.workers.refresh_worker:app", "--host", "0.0.0.0", "--port", "8001"]
    environment:
      <<: *api-env
      CRON_FETCH_INTERVAL: ${CRON_FETCH_INTERVAL:-15}
      CRON_NIGHTLY_REFRESH_HOUR: ${CRON_NIGHTLY_REFRESH_HOUR:-3}
      # The API forwards /admin/refresh here.
      REFRESH_WORKER_URL: http://worker:8001
    depends_on:
      postgres:
        condition: service_healthy
      miniflux:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  niouzou_db:
