# Nginx config for the Niouzou PWA single-page app.
server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache the hashed asset bundle; Vite fingerprints filenames so this is
    # safe and immutable.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Client-side routing: every unknown path falls back to index.html so deep
    # links (e.g. /saved, /keywords) resolve to the React router.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # The SPA shell must never be cached without revalidation: it's the only
    # file that references the fingerprinted /assets/ bundle, so a stale
    # index.html pins the client to an old deploy. `no-cache` keeps the etag
    # round-trip (cheap 304 when unchanged) but guarantees the browser always
    # picks up a fresh deploy. Reached on both `/` and the SPA fallback above,
    # which internally redirect to /index.html.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
